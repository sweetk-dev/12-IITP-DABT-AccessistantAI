<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>정책 검토 콘솔</title>
<style>
  :root { --bg:#f5f6f8; --card:#fff; --line:#e3e6ea; --ink:#1f2430; --muted:#6b7280; --accent:#2563eb; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
  header { background:var(--card); border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; }
  header h1 { font-size:16px; margin:0; }
  header .sub { color:var(--muted); font-size:12px; }
  .wrap { display:grid; grid-template-columns:340px 1fr; gap:16px; padding:16px; align-items:start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; }
  .list { padding:8px; max-height:calc(100vh - 110px); overflow:auto; }
  .item { padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; cursor:pointer; }
  .item:hover { border-color:var(--accent); }
  .item.active { border-color:var(--accent); background:#eff4ff; }
  .item .pid { font-weight:600; }
  .item .ttl { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.3; }
  .badges { margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
  .b { font-size:11px; padding:2px 7px; border-radius:999px; border:1px solid var(--line); }
  .b.changes { background:#eef2ff; color:#3730a3; }
  .b.ok { background:#ecfdf5; color:var(--ok); }
  .b.warn { background:#fffbeb; color:var(--warn); }
  .b.bad { background:#fef2f2; color:var(--bad); }
  .detail { padding:16px; min-height:300px; }
  .detail h2 { font-size:15px; margin:0 0 2px; }
  .detail .meta { color:var(--muted); font-size:12px; margin-bottom:12px; }
  .alert { padding:8px 12px; border-radius:8px; font-size:13px; margin-bottom:10px; }
  .alert.bad { background:#fef2f2; color:var(--bad); border:1px solid #fecaca; }
  .alert.ok { background:#ecfdf5; color:var(--ok); border:1px solid #bbf7d0; }
  .diff { border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
  .diff .head { padding:8px 10px; background:#fafbfc; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); }
  .diff .head .key { font-weight:600; font-family:ui-monospace,monospace; font-size:13px; }
  .diff .head .auto { font-size:11px; color:var(--muted); margin-left:auto; }
  .diff .body { display:grid; grid-template-columns:1fr 1fr; gap:0; }
  .diff .col { padding:8px 10px; font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:220px; overflow:auto; }
  .diff .old { background:#fff7f7; border-right:1px solid var(--line); }
  .diff .new { background:#f4fbf6; }
  .col .lbl { font-size:10px; color:var(--muted); display:block; margin-bottom:3px; }
  .review { font-size:12px; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px 10px; margin-bottom:10px; }
  .bar { display:flex; gap:10px; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  button { font:inherit; border:1px solid var(--line); background:#fff; padding:8px 14px; border-radius:8px; cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.danger { background:#fff; color:var(--bad); border-color:#fecaca; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  label.chk { display:flex; align-items:center; gap:6px; cursor:pointer; }
  .empty { color:var(--muted); text-align:center; padding:40px 0; }
  .refresh { margin-left:auto; }
</style>
</head>
<body>
<header>
  <h1>정책 검토 콘솔</h1>
  <span class="sub">staging 변경 검토 · 필드 단위 승인</span>
  <button class="refresh" onclick="loadList()">새로고침</button>
</header>
<div class="wrap">
  <div class="card"><div class="list" id="list"><div class="empty">불러오는 중…</div></div></div>
  <div class="card"><div class="detail" id="detail"><div class="empty">왼쪽에서 정책을 선택하세요.</div></div></div>
</div>
<script>
const API = "/admin/api/staging";
let current = null;

async function loadList(){
  const el = document.getElementById("list");
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const r = await fetch(API); const items = await r.json();
    if(!items.length){ el.innerHTML = '<div class="empty">검토 대기 항목이 없습니다.</div>'; return; }
    el.innerHTML = "";
    for(const it of items){
      const div = document.createElement("div");
      div.className = "item" + (current===it.policy_id ? " active":"");
      const reg = it.regression && it.regression.length;
      div.innerHTML = `<div class="pid">${it.policy_id}</div>
        <div class="ttl">${it.title||""}</div>
        <div class="badges">
          <span class="b changes">${it.n_changes} 변경</span>
          ${it.schema_ok ? '<span class="b ok">스키마 OK</span>' : '<span class="b bad">스키마 오류</span>'}
          ${reg ? '<span class="b bad">회귀 차단</span>' : ''}
          ${it.review_count ? `<span class="b warn">검토 ${it.review_count}</span>`:''}
        </div>`;
      div.onclick = ()=>loadDetail(it.policy_id);
      el.appendChild(div);
    }
  } catch(e){ el.innerHTML = '<div class="empty">목록 로드 실패: '+e+'</div>'; }
}

function fmt(v){ if(v===null||v===undefined) return "(없음)"; return (typeof v==="object")? JSON.stringify(v,null,2) : String(v); }

async function loadDetail(pid){
  current = pid; loadList();
  const el = document.getElementById("detail");
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const r = await fetch(API+"/"+pid); 
    if(!r.ok){ el.innerHTML = '<div class="empty">로드 실패</div>'; return; }
    const d = await r.json();
    const reg = d.regression && d.regression.length;
    let h = `<h2>${d.policy_id} <span style="font-weight:400">${d.title||""}</span></h2>
      <div class="meta">${d.staged_name}${d.sources_changed&&d.sources_changed.length? " · 출처: "+d.sources_changed.join(", "):""}</div>`;
    if(reg) h += `<div class="alert bad">회귀 가드 차단: ${d.regression.join(" / ")} — 전체 반영 불가(선택 반영 시 재검사)</div>`;
    if(!d.schema_ok) h += `<div class="alert bad">스키마 오류: ${(d.schema_errors||[]).join(" / ")}</div>`;
    if(d.review && d.review.length){
      h += `<div class="review"><b>검토 필요 ${d.review.length}건</b> (자동 미적용): ` +
           d.review.map(x=>`${x.reason||x.classification||""} ${x.path||""}`).join(" · ") + `</div>`;
    }
    const content = d.diffs.filter(x=>!x.is_meta);
    const metas = d.diffs.filter(x=>x.is_meta);
    if(!content.length){ h += '<div class="empty">내용 변경 없음(메타만).</div>'; }
    for(const df of content){
      h += `<div class="diff">
        <div class="head">
          <label class="chk"><input type="checkbox" class="selkey" value="${df.key}" checked> <span class="key">${df.key}</span></label>
        </div>
        <div class="body">
          <div class="col old"><span class="lbl">기존</span>${escapeHtml(fmt(df.old))}</div>
          <div class="col new"><span class="lbl">갱신</span>${escapeHtml(fmt(df.new))}</div>
        </div></div>`;
    }
    if(metas.length) h += `<div class="meta">메타 자동 반영: ${metas.map(m=>m.key).join(", ")}</div>`;
    h += `<div class="bar">
        <label class="chk"><input type="checkbox" id="reingest" checked> 승인 시 DB 자동 재적재</label>
        <button class="primary" id="btnApply" onclick="applySel('${pid}')">선택 반영</button>
        <button class="danger" onclick="rejectOne('${pid}')">반려</button>
        <span id="msg" style="font-size:12px;color:var(--muted)"></span>
      </div>`;
    el.innerHTML = h;
  } catch(e){ el.innerHTML = '<div class="empty">로드 실패: '+e+'</div>'; }
}

function escapeHtml(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function applySel(pid){
  const keys = Array.from(document.querySelectorAll(".selkey:checked")).map(x=>x.value);
  if(!keys.length){ setMsg("선택된 변경이 없습니다.", true); return; }
  const reingest = document.getElementById("reingest").checked;
  document.getElementById("btnApply").disabled = true;
  setMsg("반영 중…");
  try {
    const r = await fetch(API+"/"+pid+"/apply", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({selected_keys:keys, reingest})});
    const j = await r.json();
    if(r.ok){ setMsg("반영 완료: "+(j.applied_keys||[]).join(", ")+(j.reingested?" · 재적재됨":"")); current=null; setTimeout(()=>{loadList(); document.getElementById("detail").innerHTML='<div class="empty">반영 완료. 다음 항목을 선택하세요.</div>';}, 800); }
    else { const det = j.detail||j; setMsg("실패: "+(det.error||JSON.stringify(det))+(det.details?" ("+det.details.join("; ")+")":""), true); document.getElementById("btnApply").disabled=false; }
  } catch(e){ setMsg("오류: "+e, true); document.getElementById("btnApply").disabled=false; }
}

async function rejectOne(pid){
  if(!confirm(pid+" staging을 반려(폐기)할까요?")) return;
  try {
    const r = await fetch(API+"/"+pid+"/reject", {method:"POST"});
    if(r.ok){ current=null; loadList(); document.getElementById("detail").innerHTML='<div class="empty">반려됨.</div>'; }
    else setMsg("반려 실패", true);
  } catch(e){ setMsg("오류: "+e, true); }
}

function setMsg(m, bad){ const el=document.getElementById("msg"); if(el){ el.textContent=m; el.style.color = bad? "var(--bad)":"var(--muted)"; } }
loadList();
</script>
</body>
</html>
